{
    "tick_interval_seconds": 300,
    "ipc": {
        "socket_path": "/run/straylight/backup.sock"
    },
    "backup_directory": "/var/lib/straylight/backups",
    "schedules": [
        {
            "name": "system-daily",
            "source": "/etc",
            "schedule": "daily",
            "encrypt": false,
            "remote_targets": [],
            "retention": {
                "daily": 7,
                "weekly": 4,
                "monthly": 12
            }
        },
        {
            "name": "home-weekly",
            "source": "/home",
            "schedule": "weekly",
            "encrypt": true,
            "gpg_recipient": "admin@straylight.local",
            "remote_targets": ["nas"],
            "retention": {
                "daily": 3,
                "weekly": 4,
                "monthly": 6
            }
        }
    ],
    "remotes": [
        {
            "name": "nas",
            "host": "nas.local",
            "path": "/volume1/backups/straylight",
            "port": 22,
            "ssh_key": "/root/.ssh/backup_key",
            "bandwidth_limit_kbps": 10240
        }
    ]
}
