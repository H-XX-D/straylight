<!DOCTYPE busconfig PUBLIC
 "-//freedesktop//DTD D-BUS Bus Configuration 1.0//EN"
 "http://www.freedesktop.org/standards/dbus/1.0/busconfig.dtd">
<busconfig>
  <!-- Allow straylight-wizard and straylight-settings to call Shell1 methods -->
  <policy context="default">
    <allow send_destination="org.straylight.Shell1"/>
    <allow receive_sender="org.straylight.Shell1"/>
  </policy>

  <policy user="root">
    <allow own="org.straylight.Shell1"/>
  </policy>

  <policy context="default">
    <allow send_destination="org.straylight.Shell1"
           send_interface="org.straylight.Shell1"
           send_member="ApplyTheme"/>
    <allow send_destination="org.straylight.Shell1"
           send_interface="org.straylight.Shell1"
           send_member="ApplyLayout"/>
  </policy>
</busconfig>
