# StrayLight OS — XDP eBPF Programs DKMS Configuration
#
# Note: XDP programs are eBPF objects compiled with clang -target bpf.
# They are NOT kernel modules (.ko).  DKMS is used here only for a
# consistent build/install lifecycle across kernel upgrades.
# No BUILT_MODULE_NAME or DEST_MODULE_LOCATION is needed.
#
# Build output: three .bpf.o files installed to /lib/straylight/xdp/
#   xdp_filter.bpf.o   - IP blocklist + rate limiting
#   xdp_redirect.bpf.o - VLAN/IP-based packet redirect
#   xdp_stats.bpf.o    - Per-CPU statistics collector

PACKAGE_NAME="straylight-xdp"
PACKAGE_VERSION="1.0.0"

# Build: invoke the BPF Makefile directly (no kernel Kbuild path needed)
MAKE[0]="make -C ${dkms_tree}/${PACKAGE_NAME}/${PACKAGE_VERSION}/build/kernel/xdp all"
CLEAN="make -C ${dkms_tree}/${PACKAGE_NAME}/${PACKAGE_VERSION}/build/kernel/xdp clean"

# Post-install: copy objects to /lib/straylight/xdp/
POST_INSTALL="install -d /lib/straylight/xdp && \
              install -m 0644 \
                ${dkms_tree}/${PACKAGE_NAME}/${PACKAGE_VERSION}/build/kernel/xdp/*.bpf.o \
                /lib/straylight/xdp/"

POST_REMOVE="rm -f /lib/straylight/xdp/xdp_filter.bpf.o \
                   /lib/straylight/xdp/xdp_redirect.bpf.o \
                   /lib/straylight/xdp/xdp_stats.bpf.o"

AUTOINSTALL="yes"
